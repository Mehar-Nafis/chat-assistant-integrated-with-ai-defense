{{- $tls := .Values.route.tls }}
{{- $host := .Values.route.host }}

# ---------------------------------------------------------------------------
# OpenShift Routes – HAProxy path-based routing (no nginx needed)
# All routes share the same hostname; HAProxy dispatches by path prefix.
# ---------------------------------------------------------------------------

# Frontend (catch-all – must be listed LAST in HAProxy priority, use weight)
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: route-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  {{- if $host }}
  host: {{ $host }}
  {{- end }}
  path: /
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: 3000
  {{- if $tls.enabled }}
  tls:
    termination: {{ $tls.termination }}
    insecureEdgeTerminationPolicy: {{ $tls.insecureEdgeTerminationPolicy }}
  {{- end }}
  wildcardPolicy: None
---
# Chain Server query/stream API (frontend path alias /api/query)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: route-query
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/timeout: 600s
    haproxy.router.openshift.io/rewrite-target: /query
    # SSE streaming: treat as long-lived tunnel so HAProxy flushes chunks immediately
    haproxy.router.openshift.io/websocket: "true"
    haproxy.router.openshift.io/timeout-tunnel: 600s
spec:
  {{- if $host }}
  host: {{ $host }}
  {{- end }}
  path: /api/query
  to:
    kind: Service
    name: chain-server
    weight: 100
  port:
    targetPort: 8009
  {{- if $tls.enabled }}
  tls:
    termination: {{ $tls.termination }}
    insecureEdgeTerminationPolicy: {{ $tls.insecureEdgeTerminationPolicy }}
  {{- end }}
  wildcardPolicy: None
---
