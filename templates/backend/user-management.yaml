---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: user-management
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      containers:
        - name: user-management
          image: {{ .Values.images.userManagement }}
          ports:
            - containerPort: 8014
          resources:
            {{- include "chat-assistance.resources.backend" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 8014
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8014
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-management
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8014
      targetPort: 8014
  selector:
    app: user-management
