---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: notification-agent
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: notification-agent
  template:
    metadata:
      labels:
        app: notification-agent
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      containers:
        - name: notification-agent
          image: {{ .Values.images.notificationAgent }}
          ports:
            - containerPort: 8015
          resources:
            {{- include "chat-assistance.resources.backend" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 8015
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8015
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8015
      targetPort: 8015
  selector:
    app: notification-agent
