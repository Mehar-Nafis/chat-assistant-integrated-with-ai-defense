---
# MongoDB – StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: insurance-mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: insurance-mongodb
spec:
  serviceName: insurance-mongodb
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: insurance-mongodb
  template:
    metadata:
      labels:
        app: insurance-mongodb
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      containers:
        - name: mongodb
          image: {{ .Values.images.mongodb }}
          ports:
            - containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MONGO_INITDB_DATABASE
          resources:
            {{- include "chat-assistance.resources.infra" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.storage.storageClassName }}
        storageClassName: {{ .Values.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.storage.mongo.size }}
---
# MongoDB – Service
apiVersion: v1
kind: Service
metadata:
  name: insurance-mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  selector:
    app: insurance-mongodb
