{{- if .Values.nvidia.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: topic-control
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
    app: topic-control
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: topic-control
  template:
    metadata:
      labels:
        app: topic-control
        gpu-workload: "true"
        {{- include "chat-assistance.labels" . | nindent 8 }}
    spec:
      {{- include "chat-assistance.nodeSelector" . | nindent 6 }}
      {{- include "chat-assistance.nimAntiAffinity" . | nindent 6 }}

      imagePullSecrets:
        - name: ncr-registry-secret
      initContainers:
        - name: wait-for-content
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for content to be ready..."
              until wget -q -O /dev/null http://content:8000/v1/health/ready 2>/dev/null; do
                echo "content not ready, sleeping 30s..."
                sleep 30
              done
              echo "content is ready, starting topic-control NIM."
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      containers:
        - name: topic-control
          image: {{ .Values.images.topicControl }}
          ports:
            - containerPort: 8000
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            - name: NIM_NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ngc-api-secret
                  key: api-key
            {{- if .Values.nvidia.topicControlProfile }}
            - name: NIM_MODEL_PROFILE
              value: {{ .Values.nvidia.topicControlProfile | quote }}
            {{- end }}
            - name: NIM_MAX_NUM_SEQS
              value: {{ .Values.nvidia.maxNumSeqs | default "2" | quote }}
            # NIM_KVCACHE_PERCENT removed — vLLM-specific; crashes TRT-LLM auto-selected profiles
          resources:
            {{- include "chat-assistance.resources.nvidia" . | nindent 12 }}
          securityContext:
            {{- include "chat-assistance.securityContext" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 30
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: nim-cache-topic-control
---
apiVersion: v1
kind: Service
metadata:
  name: topic-control
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chat-assistance.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: topic-control
{{- end }}
